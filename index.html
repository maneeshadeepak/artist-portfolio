<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maneesha Deepak – Artist Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fbfbf9;
      --text-main: #1a1a1a;
      --text-muted: #6b6b6b;
      --divider: #e5e5e5;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Header ---------- */

    header {
      max-width: 980px;
      margin: 0 auto;
      padding: 120px 24px 96px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }

    header p {
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    /* ---------- Main Content ---------- */

    main {
      padding: 0 24px 120px;
    }

    .gallery-intro {
      max-width: 980px;
      margin: 0 auto 64px;
    }

    .gallery-title {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--divider);
    }

    /* ---------- Gallery Layout (Lisa Brandon–inspired) ---------- */

    .gallery-wrapper {
      max-width: 980px;
      margin: 0 auto;
    }

    .gallery {
      column-count: 2;
      column-gap: 48px;
    }

    @media (max-width: 900px) {
      .gallery {
        column-count: 1;
      }
    }

    .art-card {
      break-inside: avoid;
      margin-bottom: 72px;
    }

    .art-card img {
      width: 100%;
      display: block;
      border-radius: 2px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.08);
    }

    .art-card .info {
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* ---------- Footer ---------- */

    footer {
      border-top: 1px solid var(--divider);
      max-width: 980px;
      margin: 0 auto;
      padding: 56px 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ---------- Mobile ---------- */

    @media (max-width: 768px) {
      header h1 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Maneesha Deepak</h1>
    <p>Paintings & Drawings</p>
  </header>

  <main>

    <div class="gallery-intro">
      <div class="gallery-title">Works</div>
      <div class="divider"></div>
    </div>

    <div class="gallery-wrapper">
      <section class="gallery">

        <div class="art-card">
          <img src="https://github.com/maneeshadeepak/artist-portfolio/blob/e82b64a142e0ed4db23983de3a894c00f64f5622/hands-on-wood-tiles.png" alt="Artwork 1">
          <div class="info">Artwork Title 1</div>
        </div>

        <div class="art-card">
          <img src="https://via.placeholder.com/600x750?text=Artwork+2" alt="Artwork 2">
          <div class="info">Artwork Title 2</div>
        </div>

        <div class="art-card">
          <img src="https://via.placeholder.com/600x1000?text=Artwork+3" alt="Artwork 3">
          <div class="info">Artwork Title 3</div>
        </div>

        <div class="art-card">
          <img src="https://via.placeholder.com/600x820?text=Artwork+4" alt="Artwork 4">
          <div class="info">Artwork Title 4</div>
        </div>

      </section>
    </div>

  </main>

  <footer>
    © <script>document.write(new Date().getFullYear())</script> Maneesha Deepak
  </footer>

</body>
</html>
