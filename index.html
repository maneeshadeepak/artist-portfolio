<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maneesha Deepak – Artist Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
  :root {
    --bg: #fdfdfb;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --accent: #bfa88f;
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 64px 72px 48px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 600;
    margin: 0;
  }

  header p {
    margin-top: 10px;
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  main {
    padding: 0 72px 80px;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 40px 28px;
  }

  .art-card {
    background: transparent;
  }

  .art-card img {
    width: 100%;
    display: block;
    border-radius: 6px;
    transition: transform 0.3s ease;
  }

  .art-card:hover img {
    transform: scale(1.02);
  }

  .art-card .info {
    margin-top: 10px;
    font-size: 14px;
    color: var(--muted);
  }

  footer {
    padding: 48px 72px;
    font-size: 13px;
    color: var(--muted);
    border-top: 1px solid #eaeaea;
  }

  @media (max-width: 768px) {
    header, main, footer {
      padding-left: 22px;
      padding-right: 22px;
    }

    header h1 {
      font-size: 32px;
    }
  }
</style>
</head>

<body>

  <header>
    <h1>Maneesha Deepak</h1>
    <p>Paintings & Drawings</p>
  </header>

  <main>
    <section class="gallery">
      <div class="art-card">
        <img src="https://via.placeholder.com/600x800?text=Artwork+1" alt="Artwork 1">
        <div class="info">Artwork Title 1</div>
      </div>

      <div class="art-card">
        <img src="https://via.placeholder.com/600x800?text=Artwork+2" alt="Artwork 2">
        <div class="info">Artwork Title 2</div>
      </div>

      <div class="art-card">
        <img src="https://via.placeholder.com/600x800?text=Artwork+3" alt="Artwork 3">
        <div class="info">Artwork Title 3</div>
      </div>

      <div class="art-card">
        <img src="https://via.placeholder.com/600x800?text=Artwork+4" alt="Artwork 4">
        <div class="info">Artwork Title 4</div>
      </div>
    </section>
  </main>

  <footer>
    © <script>document.write(new Date().getFullYear())</script> Maneesha Deepak
  </footer>

</body>
</html>
