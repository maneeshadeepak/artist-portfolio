<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maneesha Deepak – Artist Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
  :root {
    --bg: #fbfbf9;
    --text-main: #1a1a1a;
    --text-muted: #6b6b6b;
    --divider: #e5e5e5;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */

  header {
    padding: 88px 96px 64px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
  }

  header p {
    margin-top: 14px;
    font-size: 14px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* ---------- Gallery Wrapper ---------- */

  main {
    padding: 0 96px 120px;
  }

  .gallery-title {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 48px;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: var(--divider);
    margin-bottom: 56px;
  }

  /* ---------- Gallery Grid ---------- */

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 64px 36px;
  }

  .art-card {
    background: transparent;
  }

  .art-card img {
    width: 100%;
    display: block;
    border-radius: 4px;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
  }

  .art-card .info {
    margin-top: 14px;
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ---------- Footer ---------- */

  footer {
    border-top: 1px solid var(--divider);
    padding: 56px 96px;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ---------- Mobile ---------- */

  @media (max-width: 768px) {
    header {
      padding: 64px 24px 48px;
    }

    header h1 {
      font-size: 34px;
    }

    main {
      padding: 0 24px 88px;
    }

    footer {
      padding: 40px 24px;
    }
  }
</style>
</head>

<body>

  <header>
    <h1>Maneesha Deepak</h1>
    <p>Paintings & Drawings</p>
  </header>

  <main>
    <section class="gallery">
      <div class="art-card">
        <img src="https://via.placeholder.com/600x800?text=Artwork+1" alt="Artwork 1">
        <div class="info">Artwork Title 1</div>
      </div>

      <div class="art-card">
        <img src="https://via.placeholder.com/600x800?text=Artwork+2" alt="Artwork 2">
        <div class="info">Artwork Title 2</div>
      </div>

      <div class="art-card">
        <img src="https://via.placeholder.com/600x800?text=Artwork+3" alt="Artwork 3">
        <div class="info">Artwork Title 3</div>
      </div>

      <div class="art-card">
        <img src="https://via.placeholder.com/600x800?text=Artwork+4" alt="Artwork 4">
        <div class="info">Artwork Title 4</div>
      </div>
    </section>
  </main>

  <footer>
    © <script>document.write(new Date().getFullYear())</script> Maneesha Deepak
  </footer>

</body>
</html>
